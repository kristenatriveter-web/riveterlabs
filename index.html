<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riveter Labs</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }
    .rl-page {
      background: #2a9d8f;
      min-height: 100vh;
      width: 100%;
      display: flex;
      flex-direction: column;
      font-family: 'Poppins', sans-serif;
      position: relative;
    }
    .hero {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 8rem 2.5rem 6rem;
      position: relative;
      overflow: hidden;
    }
    .arrows-svg {
      position: absolute;
      top: 0; left: 50%;
      transform: translateX(-50%);
      width: 100%; height: 100%;
      pointer-events: none;
    }
    .tagline {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      position: relative;
      z-index: 1;
    }
    .tagline span {
      color: rgba(255,255,255,0.65);
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      font-weight: 300;
    }
    .dot {
      width: 4px; height: 4px;
      background: rgba(255,255,255,0.4);
      border-radius: 50%;
      flex-shrink: 0;
    }
    .for-line {
      color: rgba(255,255,255,0.4);
      font-size: 13.2px;
      letter-spacing: 0.04em;
      font-weight: 300;
      position: relative;
      z-index: 1;
      margin: 0.3rem 0 1rem;
    }
    .divider-line {
      height: 0.5px;
      background: rgba(255,255,255,0.3);
      margin: 0 0 1.5rem;
      position: relative;
      z-index: 1;
      width: 70%;
    }
    h1 {
      color: #fff;
      font-size: clamp(3.08rem, 8.8vw, 5.5rem);
      font-weight: 300;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      line-height: 1.1;
      position: relative;
      z-index: 1;
      font-family: 'Poppins', sans-serif;
    }
    .footer-bar {
      padding: 2.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative;
      z-index: 1;
    }
    .footer-bar p {
      color: rgba(255,255,255,0.4);
      font-size: 12px;
      letter-spacing: 0.08em;
    }
    .footer-bar a {
      color: rgba(255,255,255,0.45);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-bar a:hover { color: rgba(255,255,255,0.8); }
    .menu-btn {
      position: absolute;
      top: 2.5rem;
      right: 2.5rem;
      z-index: 2;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .menu-btn span {
      display: block;
      width: 22px;
      height: 1px;
      background: rgba(255,255,255,0.7);
    }
    .menu-btn:hover span { background: rgba(255,255,255,1); }
    .menu-wrap {
      position: absolute;
      top: 2.5rem;
      right: 2.5rem;
      z-index: 2;
    }
    .menu-btn {
      position: static;
    }
    .dropdown {
      position: absolute;
      top: calc(100% + 0.75rem);
      right: 0;
      background: rgba(0,0,0,0.25);
      border: 0.5px solid rgba(255,255,255,0.2);
      min-width: 140px;
      display: none;
      flex-direction: column;
      overflow: hidden;
    }
    .dropdown.open { display: flex; }
    .dropdown a {
      color: rgba(255,255,255,0.8);
      text-decoration: none;
      font-size: 12px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 300;
      padding: 0.85rem 1.25rem;
      transition: background 0.2s;
    }
    .dropdown a:hover { background: rgba(255,255,255,0.08); }
  </style>
</head>
<body>
  <div class="rl-page">
    <div class="menu-wrap">
      <button class="menu-btn" id="menuToggle" aria-label="Menu">
        <span></span>
        <span></span>
        <span></span>
      </button>
      <div class="dropdown" id="navDropdown">
        <a href="bio.html">About Me</a>
        <a href="who-i-work-with.html">Who I Work With</a>
      </div>
    </div>
    <div class="hero">
      <svg class="arrows-svg" viewBox="0 0 600 700" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <polygon points="300,80 90,700 510,700" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="0.6"/>
        <polygon points="300,80 195,700 405,700" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="0.6"/>
        <line x1="300" y1="80" x2="300" y2="700" stroke="rgba(255,255,255,0.07)" stroke-width="0.6"/>
      </svg>

      <div class="tagline">
        <span>Strategy</span>
        <div class="dot"></div>
        <span>Coaching</span>
        <div class="dot"></div>
        <span>Growth</span>
      </div>
      <div class="for-line">For corporate innovators, founders, funds, and foundations</div>
      <div class="divider-line"></div>
      <h1>Riveter Labs</h1>
    </div>

    <div class="footer-bar">
      <p>© 2026 Riveter Labs</p>
      <a href="mailto:hello@riveter.co">hello@riveter.co</a>
    </div>
  </div>
  <script>
    var menuToggle = document.getElementById('menuToggle');
    var dropdown = document.getElementById('navDropdown');

    menuToggle.addEventListener('click', function(e) {
      e.stopPropagation();
      dropdown.classList.toggle('open');
    });

    document.addEventListener('click', function(e) {
      if (!dropdown.contains(e.target) && !menuToggle.contains(e.target)) {
        dropdown.classList.remove('open');
      }
    });
  </script>
</body>
</html>
